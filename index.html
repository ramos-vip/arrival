<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>RAMOS NJT VIP TRANSFER</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E%E2%9C%88%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Roboto+Mono:wght@600&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<style>

*,*::before,*::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Inter', sans-serif;
  background: #07111f;
  color: #e2e8f0;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ════════════════════════════════
   LOGIN
════════════════════════════════ */
#login-screen {
  position: fixed; inset: 0; z-index: 9999;
  background: #07111f;
  display: flex; align-items: center; justify-content: center;
  padding: 20px;
}
.login-box {
  background: linear-gradient(160deg, #0d1e38, #09142a);
  border: 1px solid #1a3050;
  border-radius: 24px;
  padding: 46px 42px 42px;
  width: 100%; max-width: 390px;
  box-shadow: 0 40px 100px rgba(0,0,0,.75), 0 0 0 1px rgba(79,70,229,.07);
}
.login-ico {
  width: 60px; height: 60px; border-radius: 18px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-size: 28px; margin: 0 auto 22px;
  box-shadow: 0 10px 30px rgba(99,102,241,.5);
}
.login-title { font-size: 18px; font-weight: 800; color: #fff; text-align: center; margin-bottom: 6px; letter-spacing: -.4px; }
.login-sub   { font-size: 12px; color: #334155; text-align: center; margin-bottom: 34px; }
.field-wrap  { margin-bottom: 12px; }
.field-wrap label {
  display: block;
  font-size: 10px; font-weight: 700; color: #334155;
  text-transform: uppercase; letter-spacing: 1px;
  margin-bottom: 6px; padding-left: 2px;
}
.login-box input {
  width: 100%;
  background: #060e1d; border: 1px solid #1a3050; border-radius: 11px;
  padding: 13px 16px; font-size: 14px; font-family: 'Inter', sans-serif;
  color: #e2e8f0; outline: none;
  transition: border-color .2s, box-shadow .2s;
}
.login-box input::placeholder { color: #243450; }
.login-box input:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.18); }
#l-btn {
  width: 100%; display: block;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  border: none; border-radius: 11px; padding: 14px;
  font-size: 14px; font-weight: 700; color: #fff; cursor: pointer;
  margin-top: 8px; letter-spacing: .3px;
  box-shadow: 0 6px 20px rgba(79,70,229,.4);
  font-family: 'Inter', sans-serif;
  transition: opacity .15s, transform .1s;
}
#l-btn:hover  { opacity: .92; }
#l-btn:active { transform: scale(.98); }
#l-err { margin-top: 14px; font-size: 12px; color: #f87171; text-align: center; min-height: 18px; font-weight: 500; }

/* ════════════════════════════════
   APP
════════════════════════════════ */
#app { display: none; }

/* HEADER */
.hdr {
  position: sticky; top: 0; z-index: 100;
  background: rgba(7,17,31,.97);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid #0d1e36;
  padding: 12px 28px;
  display: flex; align-items: center; justify-content: space-between;
}
.hdr-brand { display: flex; align-items: center; gap: 13px; }
.hdr-ico {
  width: 40px; height: 40px; border-radius: 11px;
  background: linear-gradient(135deg, #4f46e5, #7c3aed);
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; flex-shrink: 0;
  box-shadow: 0 4px 18px rgba(99,102,241,.45);
}
.hdr-title { font-size: 15px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
.hdr-sub   { font-size: 10px; color: #3d5a7a; margin-top: 2px; }
.hdr-right { display: flex; align-items: center; gap: 12px; }
.hdr-pill {
  display: flex; align-items: center; gap: 7px;
  background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.22);
  padding: 5px 14px; border-radius: 20px;
  font-size: 12px; font-weight: 700; color: #a5b4fc;
}
.live {
  width: 7px; height: 7px; border-radius: 50%;
  background: #4ade80; box-shadow: 0 0 7px rgba(74,222,128,.8);
  animation: blink 2s ease-in-out infinite; flex-shrink: 0;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.15} }
.hdr-time { font-size: 11px; color: #1e3050; }
.logout-btn {
  background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.18);
  color: #f87171; padding: 5px 13px; border-radius: 8px;
  font-size: 11px; font-weight: 600; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: background .15s;
}
.logout-btn:hover { background: rgba(239,68,68,.15); }

/* ════════════════════════════════
   DATE BAR
════════════════════════════════ */
.date-bar {
  position: sticky; top: 65px; z-index: 90;
  background: rgba(7,17,31,.98);
  backdrop-filter: blur(16px);
  border-bottom: 1px solid #0d1e36;
  padding: 10px 22px;
  display: flex; align-items: center; gap: 7px;
  overflow-x: auto;
}
.date-bar::-webkit-scrollbar { display: none; }

.date-label {
  font-size: 10px; font-weight: 700; color: #1e3050;
  text-transform: uppercase; letter-spacing: 1px;
  white-space: nowrap; flex-shrink: 0; margin-right: 4px;
}

.dc {
  display: inline-flex; align-items: center; gap: 5px;
  padding: 7px 15px; border-radius: 20px;
  font-size: 12px; font-weight: 600;
  cursor: pointer; white-space: nowrap; flex-shrink: 0;
  border: 1px solid #1a3050;
  background: transparent; color: #3d5a7a;
  font-family: 'Inter', sans-serif;
  transition: all .18s;
  position: relative;
}
.dc:hover {
  background: rgba(79,70,229,.1);
  border-color: rgba(79,70,229,.25);
  color: #a5b4fc;
}
.dc.active {
  background: rgba(79,70,229,.18);
  border-color: rgba(99,102,241,.4);
  color: #c7d2fe;
  font-weight: 700;
  box-shadow: 0 2px 12px rgba(79,70,229,.2);
}
.dc.dc-today        { border-color: rgba(52,211,153,.15); color: #2d6a53; }
.dc.dc-today:hover  { background: rgba(52,211,153,.08); border-color: rgba(52,211,153,.3); color: #6ee7b7; }
.dc.dc-today.active { background: rgba(52,211,153,.14); border-color: rgba(52,211,153,.35); color: #6ee7b7; box-shadow: 0 2px 12px rgba(52,211,153,.15); }

.dc.dc-tmrw        { border-color: rgba(167,139,250,.15); color: #3d2d6a; }
.dc.dc-tmrw:hover  { background: rgba(167,139,250,.08); border-color: rgba(167,139,250,.3); color: #c4b5fd; }
.dc.dc-tmrw.active { background: rgba(167,139,250,.14); border-color: rgba(167,139,250,.35); color: #c4b5fd; box-shadow: 0 2px 12px rgba(139,92,246,.15); }

.dc-count {
  background: rgba(255,255,255,.08);
  border-radius: 20px; padding: 1px 7px;
  font-size: 10px; font-weight: 700;
}
.dc-nodata { opacity: .35; cursor: default; pointer-events: none; }
.dc-more {
  font-size: 11px; font-weight: 600; color: #1e3456;
  white-space: nowrap; flex-shrink: 0; align-self: center;
  padding: 0 4px;
}

/* PAGE */
.page { max-width: 1500px; margin: 0 auto; padding: 24px 22px 80px; }

/* SECTION */
.sec { margin-bottom: 0; }
.sec-head {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 24px;
  background: linear-gradient(90deg, rgba(79,70,229,.13), rgba(79,70,229,.04), transparent);
  border: 1px solid #0d1e36;
  border-left: 4px solid #4f46e5;
  border-bottom: none;
  border-radius: 12px 12px 0 0;
}
.sec-head.sh-today { border-left-color: #34d399; }
.sec-head.sh-tmrw  { border-left-color: #a78bfa; }
.sec-label { font-size: 18px; font-weight: 800; color: #fff; letter-spacing: -.3px; }
.sec-date  { font-size: 13px; color: #334155; font-weight: 400; }
.sec-count {
  margin-left: auto;
  font-size: 11px; font-weight: 700; color: #818cf8;
  background: rgba(99,102,241,.12); border: 1px solid rgba(99,102,241,.22);
  padding: 4px 14px; border-radius: 20px;
}

/* TABLE WRAPPER */
.tbl-wrap {
  border: 1px solid #0d1e36; border-radius: 0 0 12px 12px;
  background: #060f1c; overflow: hidden;
}

/* TABLE */
table {
  width: 100%; border-collapse: separate; border-spacing: 0 2px;
  padding: 6px 8px 8px;
}
col.c-time  { width: 105px; }
col.c-cust  { width: 225px; }
col.c-trip  { width: 160px; }
col.c-route { width: 190px; }
col.c-drv   { width: 240px; }

/* THEAD */
thead th {
  padding: 10px 18px 11px;
  font-size: 9px; font-weight: 700; color: #1e3456;
  text-transform: uppercase; letter-spacing: 1.4px;
  text-align: left; white-space: nowrap;
  border-bottom: 1px solid #0d1e36;
}
thead th:first-child { padding-left: 22px; }
thead th:last-child  { padding-right: 22px; }

/* TBODY ROWS */
.trow > td {
  background: #0b1a2f; padding: 15px 18px; vertical-align: middle;
  border-top: 1px solid #0f2244; border-bottom: 1px solid #0f2244;
  transition: background .15s, border-color .15s;
}
.trow > td + td { border-left: 1px solid #091829; }
.trow > td:first-child { border-left: 3px solid transparent; border-radius: 9px 0 0 9px; padding-left: 20px; }
.trow > td:last-child  { border-right: 1px solid #0f2244; border-radius: 0 9px 9px 0; padding-right: 22px; }

.trow:hover > td             { background: #0d2246; border-top-color: #1a3360; border-bottom-color: #1a3360; }
.trow:hover > td + td        { border-left-color: #112036; }
.trow:hover > td:first-child { border-left-color: #4f46e5; }
.trow:hover > td:last-child  { border-right-color: #1a3360; }

/* TIME */
.td-time {
  font-size: 36px; font-weight: 900; color: #fff;
  letter-spacing: -2px; line-height: 1;
  font-variant-numeric: tabular-nums; white-space: nowrap;
}
.td-tarih {
  font-size: 11px; font-weight: 600; color: #3d5a7a;
  letter-spacing: .3px; margin-top: 5px;
  font-variant-numeric: tabular-nums;
}

/* CUSTOMER */
.cust-name {
  font-size: 14px; font-weight: 700; color: #f0f4ff;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
}
a.phn {
  display: inline-flex; align-items: center; gap: 4px;
  color: #38bdf8; text-decoration: none;
  font-size: 11px; font-weight: 500; white-space: nowrap;
  background: rgba(56,189,248,.07); border: 1px solid rgba(56,189,248,.14);
  padding: 2px 9px; border-radius: 20px; transition: background .15s;
}
a.phn:hover { background: rgba(56,189,248,.14); color: #7dd3fc; }
.no-phone { font-size: 11px; color: #1a3050; }

/* TRIP */
.fl-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg, rgba(79,70,229,.22), rgba(124,58,237,.16));
  border: 1px solid rgba(99,102,241,.32); color: #a5b4fc;
  font-size: 11px; font-weight: 700; padding: 4px 11px; border-radius: 20px;
  white-space: nowrap; margin-bottom: 6px; letter-spacing: .3px;
}
a.fl-chip {
  text-decoration: none; cursor: pointer;
  transition: background .15s, border-color .15s, color .15s;
}
a.fl-chip:hover {
  background: linear-gradient(135deg, rgba(79,70,229,.38), rgba(124,58,237,.3));
  border-color: rgba(99,102,241,.6); color: #c7d2fe;
}
.td-meta { font-size: 11px; color: #3d5a7a; display: flex; align-items: center; gap: 5px; }

/* ROUTE */
.route-row {
  display: flex; align-items: flex-start; gap: 8px;
  font-size: 12px; font-weight: 500; line-height: 1.5;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}
.route-from { color: #34d399; margin-bottom: 5px; }
.route-to   { color: #a78bfa; }
.rt-icon    { font-size: 11px; flex-shrink: 0; margin-top: 1px; opacity: .6; }

/* DRIVER */
.drv-name {
  font-size: 13px; font-weight: 700; color: #818cf8;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis; margin-bottom: 6px;
}
.drv-bottom { display: flex; align-items: center; gap: 7px; flex-wrap: wrap; }
.plaka {
  font-family: 'Roboto Mono', monospace;
  font-size: 10px; font-weight: 600; color: #3d5a7a;
  background: #060e1c; border: 1px solid #0d1e36;
  padding: 2px 8px; border-radius: 4px; letter-spacing: 1.5px; white-space: nowrap;
}
.badge-un {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(239,68,68,.08); border: 1px solid rgba(239,68,68,.18);
  color: #f87171; font-size: 10px; font-weight: 700;
  padding: 4px 10px; border-radius: 20px; letter-spacing: .5px; text-transform: uppercase;
}

/* EMPTY */
.empty { text-align: center; padding: 80px 20px; color: #1a3050; font-size: 15px; }
.empty-ico { font-size: 48px; display: block; margin-bottom: 14px; opacity: .12; }
.empty-hint { font-size: 12px; color: #0d1e36; margin-top: 8px; }
.empty-loading { color: #3d5a7a; }
.empty-loading .empty-ico { opacity: .5; animation: spin 1.4s linear infinite; display: inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }

/* ADD BTN */
.add-btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(79,70,229,.12); border: 1px solid rgba(79,70,229,.28);
  color: #a5b4fc; font-size: 12px; font-weight: 700;
  padding: 6px 14px; border-radius: 20px; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all .15s; white-space: nowrap;
}
.add-btn:hover { background: rgba(79,70,229,.24); border-color: rgba(79,70,229,.5); color: #c7d2fe; }

/* MODAL */
.modal-ov {
  position: fixed; inset: 0; z-index: 10001;
  background: rgba(0,0,10,.85); backdrop-filter: blur(8px);
  display: none; align-items: center; justify-content: center; padding: 20px;
}
.modal-ov.open { display: flex; }
.modal-box {
  background: linear-gradient(160deg,#0d1e38,#09142a);
  border: 1px solid #1a3050; border-radius: 20px;
  padding: 32px; width: 100%; max-width: 600px;
  max-height: 90vh; overflow-y: auto;
  box-shadow: 0 40px 100px rgba(0,0,0,.7);
  animation: msl .2s ease;
}
@keyframes msl { from{opacity:0;transform:scale(.96) translateY(12px)} to{opacity:1;transform:none} }
.modal-title { font-size: 15px; font-weight: 800; color: #fff; margin-bottom: 22px; }
.form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
.fg { display: flex; flex-direction: column; gap: 5px; }
.fg.full { grid-column: 1/-1; }
.fg label { font-size: 9px; font-weight: 700; color: #334155; text-transform: uppercase; letter-spacing: 1px; }
.fg input, .fg select {
  background: #060e1d; border: 1px solid #1a3050; border-radius: 9px;
  padding: 9px 12px; font-size: 13px; font-family: 'Inter', sans-serif;
  color: #e2e8f0; outline: none; transition: border-color .2s, box-shadow .2s;
}
.fg input:focus, .fg select:focus { border-color: #4f46e5; box-shadow: 0 0 0 3px rgba(79,70,229,.15); }
.fg input::placeholder { color: #243450; }
.fg select option { background: #0d1e38; }
.modal-acts { display: flex; gap: 10px; justify-content: flex-end; margin-top: 20px; }
.btn-ok {
  background: linear-gradient(135deg,#4f46e5,#7c3aed); border: none;
  border-radius: 10px; padding: 11px 24px;
  font-size: 13px; font-weight: 700; color: #fff; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: opacity .15s;
}
.btn-ok:hover { opacity: .88; }
.btn-ok:disabled { opacity: .5; cursor: default; }
.btn-cx {
  background: transparent; border: 1px solid rgba(255,255,255,.15);
  color: #94a3b8; border-radius: 10px; padding: 11px 18px;
  font-size: 13px; font-weight: 600; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all .15s;
}
.btn-cx:hover { background: rgba(255,255,255,.08); color: #fff; }

/* STATUS STEPPER */
.st-track {
  display: flex; align-items: flex-start;
  margin-top: 10px; padding: 8px 8px 7px;
  background: rgba(0,0,0,.28); border-radius: 10px;
  border: 1px solid #0d1e36; gap: 0; transition: opacity .2s;
}
.st-track.loading { opacity: .4; pointer-events: none; }
.st-step {
  display: flex; flex-direction: column; align-items: center;
  flex: 1; cursor: pointer; gap: 5px; padding: 3px 2px;
  border-radius: 6px; transition: background .15s; user-select: none;
}
.st-step:hover { background: rgba(255,255,255,.06); }
.st-dot {
  width: 12px; height: 12px; border-radius: 50%;
  border: 2px solid #1e3456; background: #060e1c;
  transition: all .25s; flex-shrink: 0;
}
.st-label {
  font-size: 8px; font-weight: 700; color: #1e3456;
  text-transform: uppercase; letter-spacing: .5px;
  text-align: center; white-space: nowrap; transition: color .25s;
}
.st-line {
  height: 2px; flex: 0 0 12px; background: #0d1e36;
  margin-top: 8px; border-radius: 1px; transition: background .3s;
}
.st-line.done { background: rgba(255,255,255,.22); }
/* S1 — Karşılandı (blue) */
.st-step.s1.active .st-dot, .st-step.s1.done .st-dot { background:#38bdf8; border-color:#38bdf8; }
.st-step.s1.active .st-dot { box-shadow: 0 0 10px rgba(56,189,248,.65); }
.st-step.s1.active .st-label, .st-step.s1.done .st-label { color:#38bdf8; }
/* S2 — Araçta (amber) */
.st-step.s2.active .st-dot, .st-step.s2.done .st-dot { background:#fbbf24; border-color:#fbbf24; }
.st-step.s2.active .st-dot { box-shadow: 0 0 10px rgba(251,191,36,.65); }
.st-step.s2.active .st-label, .st-step.s2.done .st-label { color:#fbbf24; }
/* S3 — Teslim (green) */
.st-step.s3.active .st-dot, .st-step.s3.done .st-dot { background:#34d399; border-color:#34d399; }
.st-step.s3.active .st-dot { box-shadow: 0 0 10px rgba(52,211,153,.65); }
.st-step.s3.active .st-label, .st-step.s3.done .st-label { color:#34d399; }
/* Satır sol kenar rengi */
.trow.yd-karsila > td:first-child { border-left-color:#38bdf8 !important; }
.trow.yd-aracta  > td:first-child { border-left-color:#fbbf24 !important; }
.trow.yd-teslim  > td:first-child { border-left-color:#34d399 !important; }
.trow.yd-teslim  > td { opacity:.5; }

/* PRINT BTN */
.print-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: rgba(99,102,241,.08); border: 1px solid rgba(99,102,241,.2);
  color: #818cf8; font-size: 10px; font-weight: 700;
  padding: 5px 13px; border-radius: 8px; cursor: pointer;
  font-family: 'Inter', sans-serif; transition: all .15s; letter-spacing: .4px;
  margin-left: 10px;
}
.print-btn:hover { background: rgba(99,102,241,.18); border-color: rgba(99,102,241,.4); color: #c7d2fe; }

/* FOOTER */
.footer { text-align: center; padding: 22px; font-size: 11px; color: #0d1e36; }

/* ════════════════════════════════
   SEARCH BAR
════════════════════════════════ */
.srch-wrap {
  margin-left: auto; flex-shrink: 0;
  flex: 0 1 380px; min-width: 220px;
}
.srch-inner {
  display: flex; align-items: center; gap: 10px;
  background: #0b1829;
  border: 1px solid #1e3a5f;
  border-radius: 12px;
  padding: 9px 14px;
  transition: border-color .2s, box-shadow .2s;
  width: 100%;
}
.srch-inner:focus-within {
  border-color: #4f46e5;
  box-shadow: 0 0 0 3px rgba(79,70,229,.15);
}
.srch-ic { flex-shrink: 0; opacity: .7; }
#search-input {
  flex: 1; background: transparent; border: none; outline: none;
  font-size: 13px; font-family: 'Inter', sans-serif;
  color: #e2e8f0; min-width: 0;
}
#search-input::placeholder { color: #2d4a6a; }
#srch-clear {
  background: rgba(255,255,255,.07);
  border: 1px solid rgba(255,255,255,.1);
  border-radius: 6px;
  color: #4d6a80; cursor: pointer;
  font-size: 11px; font-weight: 600;
  padding: 2px 9px; flex-shrink: 0;
  font-family: 'Inter', sans-serif;
  transition: all .15s;
  display: none;
}
#srch-clear:hover { background: rgba(239,68,68,.12); border-color: rgba(239,68,68,.25); color: #f87171; }
.trow.s-hide { display: none !important; }

/* ════════════════════════════════
   VOUCHER BUTTON (satır içi)
════════════════════════════════ */
.vchr-btn {
  display: inline-flex; align-items: center; gap: 5px;
  margin-top: 8px;

<script>
/* ════ AUTH ════ */
/* Şifreler burada YOK — GAS Script Properties'te SHA-256 hash olarak saklanır.
   Kaynak kodu görüntüleyen kimse şifreyi bulamaz. */
var _loginBusy = false;
function getRole(){ return localStorage.getItem('ramos_rol')||'karsilama'; }
function isYonetici(){ return getRole()==='yonetici'; }

/* ════ API ════ */
var API = 'https://script.google.com/macros/s/AKfycbzJflnLJr_9C6ppfFMNNb8WlfJljsQl74C7ro9iICPm_COHGI32zKFMG5N-1K-OPKsFEg/exec';
var MO  = ['Ocak','Şubat','Mart','Nisan','Mayıs','Haziran','Temmuz','Ağustos','Eylül','Ekim','Kasım','Aralık'];
var GUN = ['Pazar','Pazartesi','Salı','Çarşamba','Perşembe','Cuma','Cumartesi'];
var GUN_K = ['Paz','Pts','Sal','Çar','Per','Cum','Cmt'];

var allData = [];
var selectedDate = null;
var isLoading    = false;
var _lastDataStr = ''; /* akıllı polling — gereksiz re-render önle */

function pad(n){ return ('0'+n).slice(-2); }
function fmtK(d){ return pad(d.getDate())+'.'+pad(d.getMonth()+1)+'.'+d.getFullYear(); }
function fmtU(d){ return d.getDate()+' '+MO[d.getMonth()]+' '+d.getFullYear()+', '+GUN[d.getDay()]; }
function esc(s){ return $('<span>').text(String(s||'')).html(); }

function parseTarih(s){
  var p=s.split('.');
  if(p.length!==3) return null;
  return new Date(+p[2], +p[1]-1, +p[0]);
}

function getToday()    { return fmtK(new Date()); }
function getTomorrow() { var d=new Date(); d.setDate(d.getDate()+1); return fmtK(d); }

function telLink(v){
  if(!v||v.trim()===''||v.indexOf('ERROR')>-1) return '';
  return '<a href="tel:+'+v.replace(/\s/g,'')+'" class="phn">📞 +'+esc(v)+'</a>';
}

/* ════ BUILD ROW ════ */
function buildRow(d){
  /* Voucher için satırı kaydet */
  if(!window.__voucherRows) window.__voucherRows = [];
  var vIdx = window.__voucherRows.length;
  window.__voucherRows.push(d);

  var saat=esc(d.saat||'-'), isim=esc(d.musteri||'-');
  var nereden=esc(d.nereden||'-'), nereye=esc(d.nereye||'-');
  var ucus=esc(d.ucus||''), kisi=esc(d.kisi||''), arac=esc(d.arac||'');
  var ucusUrl = encodeURIComponent((d.ucus||'').replace(/\s/g,''));
  var surucu=esc(d.surucu||''), plaka=esc(d.surucuPlaka||'');

  var tripHtml='';
  if(ucus&&ucus!=='-') tripHtml+='<a class="fl-chip" href="https://www.google.com/search?q='+ucusUrl+'+flight" target="_blank" rel="noopener">✈ '+ucus+'</a>';
  var parts=[];
  if(kisi) parts.push('👤 '+kisi);
  if(arac&&arac!=='-') parts.push(arac);
  if(parts.length) tripHtml+='<div class="td-meta">'+parts.join(' &nbsp;·&nbsp; ')+'</div>';

  /* Karşılamacıda müşteri telefonu gizlenir */
  var mustTel = isYonetici() ? (telLink(d.musteriTel)||'<span class="no-phone">—</span>') : '';

  /* Operasyon stepper */
  var yd    = d.yerel_durum || '';
  var ydLvl = yd==='Karşılandı'?1:yd==='Araçta'?2:yd==='Teslim Edildi'?3:0;
  var sc1=ydLvl>1?' done':ydLvl===1?' active':'';
  var sc2=ydLvl>2?' done':ydLvl===2?' active':'';
  var sc3=ydLvl===3?' active':'';
  var lc1=ydLvl>=2?' done':'', lc2=ydLvl>=3?' done':'';
  var te=esc(d.tarih), se=esc(d.saat), me=esc(d.musteri);
  var stHtml='<div class="st-track">'
    +'<div class="st-step s1'+sc1+'" data-t="'+te+'" data-s="'+se+'" data-m="'+me+'" data-d="Karşılandı">'
      +'<div class="st-dot"></div><div class="st-label">Karşılandı</div></div>'
    +'<div class="st-line'+lc1+'"></div>'
    +'<div class="st-step s2'+sc2+'" data-t="'+te+'" data-s="'+se+'" data-m="'+me+'" data-d="Araçta">'
      +'<div class="st-dot"></div><div class="st-label">Araçta</div></div>'
    +'<div class="st-line'+lc2+'"></div>'
    +'<div class="st-step s3'+sc3+'" data-t="'+te+'" data-s="'+se+'" data-m="'+me+'" data-d="Teslim Edildi">'
      +'<div class="st-dot"></div><div class="st-label">Teslim</div></div>'
    +'</div>';

  var drvHtml;
  if(surucu){
    var dbot=(plaka?'<span class="plaka">'+plaka+'</span>':'')+(telLink(d.surucuTel)||'');
    drvHtml='<div class="drv-name" title="'+surucu+'">'+surucu+'</div>'+(dbot?'<div class="drv-bottom">'+dbot+'</div>':'')+stHtml;
  } else {
    drvHtml='<span class="badge-un">⚠ Atanmadı</span>'+stHtml;
  }

  /* Saatin altına küçük tarih: "29 May" */
  var dateObj = parseTarih(d.tarih||'');
  var tarihKisa = dateObj ? '<div class="td-tarih">'+dateObj.getDate()+' '+MO[dateObj.getMonth()]+'</div>' : '';

  var trowClass = 'trow'+(yd==='Karşılandı'?' yd-karsila':yd==='Araçta'?' yd-aracta':yd==='Teslim Edildi'?' yd-teslim':'');
  return '<tr class="'+trowClass+'" style="opacity:0">'
    +'<td class="td-time"  data-label="SAAT">'+saat+tarihKisa+'</td>'
    +'<td class="td-cust"  data-label="MÜŞTERİ"><div class="cust-name" title="'+isim+'">'+isim+'</div>'+mustTel+'<button class="vchr-btn" data-idx="'+vIdx+'">🎫 Voucher</button></td>'

/* ════ TEK TARİH BÖLÜMÜ HTML ════ */
/* afterDt: isteğe bağlı Date — sadece bu andan sonraki transferleri göster (DÜN filtresi için) */
function buildOneSec(tarih, afterDt){
  var dateObj0 = parseTarih(tarih);
  var liste = allData.filter(function(d){
    if(d.tarih !== tarih) return false;
    if(afterDt && dateObj0){
      var tp = (d.saat||'00:00').split(':');
      var dt = new Date(dateObj0.getFullYear(), dateObj0.getMonth(), dateObj0.getDate(),
                        +tp[0]||0, +tp[1]||0, 0);
      if(dt < afterDt) return false;
    }
    return true;
  });
  if(!liste.length) return '';
  liste.sort(function(a,b){ return String(a.saat||'').localeCompare(String(b.saat||'')); });

  var today=getToday(), tomorrow=getTomorrow();
  var dateObj=parseTarih(tarih);
  var emoji, gun, shClass='';

  if(tarih===today){
    emoji='📅'; gun='BUGÜN'; shClass='sh-today';
  } else if(tarih===tomorrow){
    emoji='🌙'; gun='YARIN'; shClass='sh-tmrw';
  } else {
    var dun = fmtK((function(){ var d=new Date(); d.setDate(d.getDate()-1); return d; })());
    emoji = tarih===dun ? '🌙' : '📆';
    gun   = tarih===dun ? 'DÜN' : GUN[dateObj.getDay()].toUpperCase();
  }

  return '<div class="sec">'
    +'<div class="sec-head '+shClass+'">'
      +'<span class="sec-label">'+emoji+' '+gun+'</span>'
      +'<span class="sec-date">'+fmtU(dateObj)+'</span>'
      +'<span class="sec-count">'+liste.length+' transfer</span>'
      +'<button class="print-btn" onclick="printList(\''+tarih+'\')">🖨 Yazdır</button>'
    +'</div>'
    +'<div class="tbl-wrap"><table>'
      +'<colgroup><col class="c-time"><col class="c-cust"><col class="c-trip"><col class="c-route"><col class="c-drv"></colgroup>'
      +'<thead><tr><th>Saat</th><th>Müşteri</th><th>Uçuş / Araç</th><th>Güzergah</th><th>Şoför</th></tr></thead>'
      +'<tbody>'+liste.map(buildRow).join('')+'</tbody>'
    +'</table></div></div>';
}

/* ════ SHOW DATES (çoklu tarih — karşılamacı gece modu) ════ */
function showDates(tarihler){
  window.__voucherRows = [];
  /* DÜN bölümü için: sadece son 2 saat içindeki transferleri göster.
     Eğer hiç transfer yoksa DÜN başlığı da çıkmaz. */
  var now = new Date();
  var twoHoursAgo = new Date(now.getTime() - 2 * 60 * 60 * 1000);

  var visibleCount = 0;
  var html = tarihler.map(function(tarih, i){
    var cutoff = (i === 0 && tarihler.length > 1) ? twoHoursAgo : null;
    /* Görünen transfer sayısını aynı filtreden geçirerek say */
    var dateObjC = parseTarih(tarih);
    allData.forEach(function(d){
      if(d.tarih !== tarih) return;
      if(cutoff && dateObjC){
        var tp = (d.saat||'00:00').split(':');
        var dt = new Date(dateObjC.getFullYear(), dateObjC.getMonth(), dateObjC.getDate(), +tp[0]||0, +tp[1]||0, 0);
        if(dt < cutoff) return;
      }
      visibleCount++;
    });
    return buildOneSec(tarih, cutoff);
  }).join('');

  $('#cnt').text(visibleCount+' Transfer');

  if(!html){
    if(isLoading){
      $('#page').html('<div class="empty empty-loading"><span class="empty-ico">⟳</span>Veriler yükleniyor…<div class="empty-hint">Google sunucusu uyandırılıyor, lütfen bekleyin</div></div>');
    } else {
      $('#page').html('<div class="empty"><span class="empty-ico">✈</span>Bugün için transfer bulunamadı</div>');
    }
    return;
  }

  $('#page').html(html);
  var delay=0;
  $('.trow').each(function(){ $(this).delay(delay).animate({opacity:1},130); delay+=18; });
}

/* ════ BUILD DATE BAR ════ */
function buildDateBar(data){
  var today=getToday(), tomorrow=getTomorrow();

  /* Count by date */
  var counts={};
  data.forEach(function(d){ counts[d.tarih]=(counts[d.tarih]||0)+1; });

  /* Sort dates ascending */
  var dates=Object.keys(counts).sort(function(a,b){
    var pa=a.split('.'), pb=b.split('.');
    return new Date(+pa[2],+pa[1]-1,+pa[0]) - new Date(+pb[2],+pb[1]-1,+pb[0]);
  });

  if(!dates.length){
    $('#date-chips').html('<span style="font-size:12px;color:#1e3456">Veri yok</span>');
    return;
  }

  /* Seçili tarih görünür olsun: ilk 5'e dahil et */
  var MAX = 5;
  var visible = dates.slice(0, MAX);
  if(selectedDate && visible.indexOf(selectedDate) === -1){
    visible = dates.slice(0, MAX - 1);
    visible.push(selectedDate);
  }
  var hidden = dates.length - visible.length;

  var html='';
  dates.forEach(function(tarih){
    if(visible.indexOf(tarih) === -1) return; /* max 5 */
    var cnt=counts[tarih]||0;
    var cls='dc', label='', extra='';

    if(tarih===today){
      cls+=' dc-today';
      label='📅 Bugün';
    } else if(tarih===tomorrow){
      cls+=' dc-tmrw';
      label='🌙 Yarın';
    } else {
      var d=parseTarih(tarih);
      label=GUN_K[d.getDay()]+' '+d.getDate()+' '+MO[d.getMonth()].slice(0,3);
    }

    if(tarih===selectedDate) cls+=' active';
    html+='<button class="'+cls+'" data-date="'+tarih+'">'+label+'<span class="dc-count">'+cnt+'</span></button>';
  });

  /* "+ N daha" chip'i */
  if(hidden > 0){
    html+='<span class="dc-more">+'+hidden+' daha</span>';
  }

  $('#date-chips').html(html);

  $('#date-chips').off('click').on('click','.dc',function(){
    var t=$(this).data('date');
    if(t) showDate(t);
  });
}

/* ════ RENDER ════ */
function render(veriler){
  /* Tüm tarihleri trim'le — boşluk/karakter farkı olmasın */
  allData = (veriler||[]).map(function(d){
    return $.extend({}, d, { tarih: String(d.tarih||'').trim() });
  });

  var today    = getToday();
  var tomorrow = getTomorrow();
  var counts   = {};
  allData.forEach(function(d){ if(d.tarih) counts[d.tarih]=(counts[d.tarih]||0)+1; });

  var saat=new Date().toLocaleString('tr-TR',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  $('#upd').text('Son güncelleme: '+saat);

  if(isYonetici()){
    if(!selectedDate){
      selectedDate = today;
    } else if(!counts[selectedDate]){
      selectedDate = counts[today] ? today
        : (counts[tomorrow] ? tomorrow
        : (Object.keys(counts).sort(function(a,b){
            var pa=a.split('.'),pb=b.split('.');
            return new Date(+pa[2],+pa[1]-1,+pa[0])-new Date(+pb[2],+pb[1]-1,+pb[0]);
           })[0] || today));
    }
    buildDateBar(allData);
    showDate(selectedDate);
  } else {
    /* Karşılamacı:
       06:00-23:59 → sadece bugün
       00:00-05:59 → dün + bugün (gece vardiyası) */
    var now = new Date();
    if(now.getHours() < 6){
      var prev = new Date(now);
      prev.setDate(now.getDate()-1);
      showDates([fmtK(prev), fmtK(now)]);
    } else {
      showDate(today);
    }
  }
}

function updateStatus(tarih, saat, musteri, durum, btn){
  var tok    = localStorage.getItem('ramos_token')||'';
  var cb     = '__st'+Date.now();
  var s      = document.createElement('script');
  var $track = $(btn).closest('.st-track');
  s.src = API
    +'?action=status&tok='+encodeURIComponent(tok)
    +'&tarih='+encodeURIComponent(tarih)
    +'&saat='+encodeURIComponent(saat)
    +'&musteri='+encodeURIComponent(musteri)
    +'&durum='+encodeURIComponent(durum)
    +'&cb='+cb;
  $track.addClass('loading');
  var timer = setTimeout(function(){
    $track.removeClass('loading'); delete window[cb]; $(s).remove();
  }, 15000);
  window[cb] = function(res){
    clearTimeout(timer); delete window[cb]; $(s).remove();
    $track.removeClass('loading');
    if(res && res.ok){
      _lastDataStr = '';
      /* Stepper optimistik güncelleme */
      var lvl = durum==='Karşılandı'?1:durum==='Araçta'?2:durum==='Teslim Edildi'?3:0;
      $track.find('.st-step').each(function(i){
        var n=i+1;
        $(this).removeClass('done active').addClass(n<lvl?'done':n===lvl?'active':'');
      });
      $track.find('.st-line').each(function(i){
        $(this).toggleClass('done', i+1 < lvl);
      });
      var $row = $track.closest('.trow');
      $row.removeClass('yd-karsila yd-aracta yd-teslim');
      if(durum==='Karşılandı')      $row.addClass('yd-karsila');
      else if(durum==='Araçta')     $row.addClass('yd-aracta');
      else if(durum==='Teslim Edildi') $row.addClass('yd-teslim');
    }
  };
  $('head').append(s);
}

/* ════ FETCH ════ */
/* Cache: 3 saatlik VE aynı gün içinde — gece yarısı geçişinde kendiliğinden iptal olur */
function isCacheValid(ts){
  if(!ts) return false;
  if((Date.now()-ts) > 3*60*60*1000) return false;
  var cd=new Date(ts), nd=new Date();
  return cd.getDate()===nd.getDate() &&
         cd.getMonth()===nd.getMonth() &&
         cd.getFullYear()===nd.getFullYear();
}
function yukle(){
  if(localStorage.getItem('ramos_auth')!=='ok') return;
  if(isLoading) return;                        /* çakışan istek engelle */

  /* 1) Cache: max 3 saat geçerli */
  var cacheRaw = localStorage.getItem('ramos_cache');
  var cacheTs  = parseInt(localStorage.getItem('ramos_cache_ts')||'0');
  var cacheOk  = cacheRaw && isCacheValid(cacheTs);

  /* isLoading ÖNCE true yapılıyor — cache render sırasında da
     "transfer bulunamadı" yerine "yükleniyor" göstermek için */
  isLoading = true;

  if(cacheOk){
    try {
      render(JSON.parse(cacheRaw));
      $('#upd').text('Önbellek · güncelleniyor…');
    } catch(e){ cacheOk = false; }
  }

  /* 2) Taze veri çek */
  if(!cacheOk){
    /* Cache yoksa/eskiyse spinner göster */
    $('#page').html('<div class="empty empty-loading"><span class="empty-ico">⟳</span>Yükleniyor…</div>');
    $('#cnt').text('— transfer');
  }

  var cb   = '__r' + Date.now();
  var s    = document.createElement('script');
  var _tok = localStorage.getItem('ramos_token') || '';
  s.src    = API + '?tok=' + encodeURIComponent(_tok) + '&cb=' + cb + '&t=' + Date.now();

  /* 55 sn içinde cevap gelmezse sıfırla ve yeniden dene */
  var timer = setTimeout(function(){
    isLoading = false;
    delete window[cb];
    $(s).remove();
    /* Veri hiç gelmemişse → 10 sn sonra otomatik tekrar dene */
    if(allData.length === 0){
      $('#upd').text('⚠ Sunucu uyandırılıyor… yeniden deneniyor');
      $('#page').html('<div class="empty empty-loading"><span class="empty-ico">⟳</span>Sunucu uyandırılıyor…<div class="empty-hint">Birkaç saniye içinde otomatik yeniden denenecek</div></div>');
      setTimeout(yukle, 10000);
    } else {
      $('#upd').text('⚠ Zaman aşımı — yenileniyor…');
    }
  }, 55000);

  s.onerror = function(){
    clearTimeout(timer);
    isLoading = false;
    delete window[cb];
    $(s).remove();
    /* Veri hiç gelmemişse → 10 sn sonra otomatik tekrar dene */
    if(allData.length === 0){
      $('#upd').text('⚠ Bağlantı hatası — yeniden deneniyor…');
      setTimeout(yukle, 10000);
    } else {
      $('#upd').text('⚠ Bağlantı hatası');
    }
  };

  window[cb] = function(data){
    clearTimeout(timer);
    isLoading = false;

    /* Token geçersiz → şifre değişti veya oturum süresi doldu → çıkış */
    if(data && data.error === 'unauthorized'){
      localStorage.removeItem('ramos_auth');
      localStorage.removeItem('ramos_token');
      localStorage.removeItem('ramos_rol');
      localStorage.removeItem('ramos_login_ts');
      location.reload(); return;
    }

    /* API boş döndürdüyse ve elimizde veri varsa → ekranı bozma, geçici hata */
    if(!data || !data.length){
      if(allData.length > 0){
        $('#upd').text('⚠ Sunucu boş döndü — önbellek korunuyor');
        delete window[cb]; $(s).remove(); return;
      }
    }

    /* Kısmi okuma koruması: sheet yazılırken okunmuş olabilir.
       Seçili tarihin verisi sıfıra düştüyse ama elimizde veri varsa koru. */
    if(data && data.length && selectedDate && allData.length > 0){
      var _eski = allData.filter(function(d){ return (d.tarih||'').trim()===selectedDate; }).length;
      var _yeni = data.filter(function(d){ return (d.tarih||'').trim()===selectedDate; }).length;
      if(_eski > 0 && _yeni === 0){
        $('#upd').text('⚠ Geçici okuma hatası — veriler korunuyor');
        delete window[cb]; $(s).remove(); return;
      }
    }

    /* Akıllı polling: veri değişmediyse ekranı yeniden çizme */
    var newStr = JSON.stringify(data);
    if(newStr === _lastDataStr && allData.length > 0){
      var st = new Date().toLocaleString('tr-TR',{hour:'2-digit',minute:'2-digit'});
      $('#upd').text('Son güncelleme: '+st);
      delete window[cb]; $(s).remove(); return;
    }
    _lastDataStr = newStr;

    try {
      localStorage.setItem('ramos_cache',    JSON.stringify(data));
      localStorage.setItem('ramos_cache_ts', String(Date.now()));
    } catch(e){}
    render(data);
    delete window[cb];
    $(s).remove();
  };

  $('head').append(s);
}

/* ════ SESSION ════ */
var SESSION_MS = 2 * 60 * 60 * 1000; /* 2 saat */

function checkSession(){
  if(localStorage.getItem('ramos_auth')!=='ok') return false;
  var ts = parseInt(localStorage.getItem('ramos_login_ts')||'0');
  if(ts && (Date.now() - ts) > SESSION_MS){
    localStorage.removeItem('ramos_auth');
    localStorage.removeItem('ramos_token');
    localStorage.removeItem('ramos_rol');
    localStorage.removeItem('ramos_login_ts');
    location.reload();
    return false;
  }
  return true;
}

/* ════ LOGIN / AUTH ════ */
async function doLogin(){
  if(_loginBusy) return;
  var u = $('#l-user').val().trim().toLowerCase();
  var p = $('#l-pass').val();
  if(!u || !p) return;

  _loginBusy = true;
  $('#l-btn').prop('disabled', true).text('Giriş yapılıyor…');

  /* Şifreyi SHA-256 ile hashle — düz metin hiçbir yerde saklanmaz/gönderilmez */
  var hashHex;
  try {
    var buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(p));
    hashHex = Array.from(new Uint8Array(buf)).map(function(b){
      var h = b.toString(16); return h.length < 2 ? '0'+h : h;
    }).join('');
  } catch(ex) {
    _loginBusy = false;
    $('#l-btn').prop('disabled', false).text('Giriş Yap →');
    $('#l-err').text('❌ Tarayıcı hatası');
    return;
  }

  /* JSONP ile GAS'a gönder */
  var cb = '__lg' + Date.now();
  var s  = document.createElement('script');
  s.src  = API + '?action=login&user=' + encodeURIComponent(u)
         + '&h=' + hashHex + '&cb=' + cb;

  var timer = setTimeout(function(){
    _loginBusy = false;
    delete window[cb]; $(s).remove();
    $('#l-btn').prop('disabled', false).text('Giriş Yap →');
    $('#l-err').text('❌ Sunucu yanıt vermedi, tekrar dene');
    setTimeout(function(){ $('#l-err').text(''); }, 3000);
  }, 20000);

  window[cb] = function(result){
    clearTimeout(timer);
    delete window[cb]; $(s).remove();
    if(result && result.ok){
      localStorage.setItem('ramos_auth',     'ok');
      localStorage.setItem('ramos_token',    result.token);
      localStorage.setItem('ramos_rol',      result.rol);
      localStorage.setItem('ramos_login_ts', String(Date.now()));
      $('#login-screen').fadeOut(280, function(){
        $('#app').fadeIn(220);
        applyRole();
        yukle();
        setInterval(yukle, 30000);
        setInterval(checkSession, 60000);
      });
    } else {
      _loginBusy = false;
      $('#l-btn').prop('disabled', false).text('Giriş Yap →');
      $('#l-err').text('❌ Kullanıcı adı veya şifre hatalı');
      $('#l-pass').val('').focus();
      setTimeout(function(){ $('#l-err').text(''); }, 3000);
    }
  };

  $('head').append(s);
}

$(function(){
  $('#l-btn').on('click', doLogin);
  $('#l-user, #l-pass').on('keydown', function(e){ if(e.key==='Enter') doLogin(); });

  /* ── ARAMA ── */
  $('#search-input').on('input', function(){
    var q = $(this).val().trim().toLowerCase();
    $('.trow').each(function(){
      var hay = $(this).find('.cust-name').text().toLowerCase()
               +' '+ $(this).find('.fl-chip').text().toLowerCase()
               +' '+ $(this).find('.drv-name').text().toLowerCase();
      $(this).toggleClass('s-hide', q.length > 0 && hay.indexOf(q) === -1);
    });
    var vis = $('.trow:not(.s-hide)').length;
    $('#cnt').text(vis + ' Transfer');
    $('#srch-clear').toggle(q.length > 0);
  });
  $('#srch-clear').on('click', function(){
    $('#search-input').val('').trigger('input').focus();
  });

  /* Modal — ESC ve dışa tıklama */
  $('#add-modal').on('click', function(e){ if(e.target===this) closeAddModal(); });
  $(document).on('keydown', function(e){ if(e.key==='Escape') closeAddModal(); });

  /* Operasyon stepper */
  $(document).on('click', '.st-step', function(){
    var $b = $(this);
    updateStatus($b.data('t'), $b.data('s'), $b.data('m'), $b.data('d'), this);
  });

  /* Voucher butonları */
  $(document).on('click', '.vchr-btn', function(e){
    e.stopPropagation();
    showVoucher(+$(this).data('idx'));
  });
  $('#v-close-btn').on('click', function(){ $('#voucher-overlay').removeClass('open'); });
  $('#v-print-btn').on('click', function(){ window.print(); });
  /* Overlay dışına tıklayınca kapat */
  $('#voucher-overlay').on('click', function(e){ if(e.target===this) $(this).removeClass('open'); });
  /* ESC ile kapat */
  $(document).on('keydown', function(e){ if(e.key==='Escape') $('#voucher-overlay').removeClass('open'); });

  $('#logout-btn').on('click', function(){
    localStorage.removeItem('ramos_auth');
    localStorage.removeItem('ramos_token');
    localStorage.removeItem('ramos_rol');
    localStorage.removeItem('ramos_login_ts');
    location.reload();
  });

  if(localStorage.getItem('ramos_auth')==='ok'){
    if(!checkSession()){ return; } /* süresi dolmuşsa giriş ekranına */
    $('#login-screen').hide();
    $('#app').show();
    applyRole();
    yukle();
    setInterval(yukle, 30000);
    setInterval(checkSession, 60000); /* her dakika oturum süresi kontrol */
  } else {
    setTimeout(function(){ $('#l-user').focus(); },200);
  }
});
</script>
</body>
