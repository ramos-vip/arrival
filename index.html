<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,viewport-fit=cover">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>RAMOS NJT VIP TRANSFER</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23f0d060'/%3E%3Cstop offset='50%25' stop-color='%23c9a227'/%3E%3Cstop offset='100%25' stop-color='%238a6010'/%3E%3C/linearGradient%3E%3C/defs%3E%3Cpath d='M50 4 L96 22 L96 60 Q96 91 50 117 Q4 91 4 60 L4 22 Z' fill='url(%23g)'/%3E%3Cpath d='M50 13 L88 29 L88 60 Q88 87 50 109 Q12 87 12 60 L12 29 Z' fill='%2307091a'/%3E%3Ctext x='50' y='78' text-anchor='middle' font-family='Georgia%2Cserif' font-size='54' font-weight='bold' fill='url(%23g)'%3ER%3C/text%3E%3C/svg%3E">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 120'%3E%3Cdefs%3E%3ClinearGradient id='g' x1='0%25' y1='0%25' x2='100%25' y2='100%25'%3E%3Cstop offset='0%25' stop-color='%23f0d060'/%3E%3Cstop offset='50%25' stop-color='%23c9a227'/%3E%3Cstop offset='100%25' stop-color='%238a6010'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect width='100' height='120' fill='%2307091a'/%3E%3Cpath d='M50 4 L96 22 L96 60 Q96 91 50 117 Q4 91 4 60 L4 22 Z' fill='url(%23g)'/%3E%3Cpath d='M50 13 L88 29 L88 60 Q88 87 50 109 Q12 87 12 60 L12 29 Z' fill='%2307091a'/%3E%3Ctext x='50' y='78' text-anchor='middle' font-family='Georgia%2Cserif' font-size='54' font-weight='bold' fill='url(%23g)'%3ER%3C/text%3E%3C/svg%3E">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300..700;1,300..700&family=Inter:wght@100..900&family=Roboto+Mono:wght@400..700&display=swap" rel="stylesheet">
<script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
<link rel="stylesheet" href="style.css">
</head>
<body>

<!-- ═══ LOGIN ═══ -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-ico"><svg class="login-logo-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" width="38" height="46"><defs><linearGradient id="gl" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f0d060"/><stop offset="50%" stop-color="#c9a227"/><stop offset="100%" stop-color="#8a6010"/></linearGradient></defs><path d="M50 4 L96 22 L96 60 Q96 91 50 117 Q4 91 4 60 L4 22 Z" fill="url(#gl)"/><path d="M50 13 L88 29 L88 60 Q88 87 50 109 Q12 87 12 60 L12 29 Z" fill="#050c18"/><text x="50" y="78" text-anchor="middle" font-family="Georgia,serif" font-size="54" font-weight="bold" fill="url(#gl)">R</text></svg></div>
    <div class="login-title">RAMOS NJT VIP TRANSFER</div>
    <div class="login-sub">Arrival Panel — Yetkili Giriş</div>
    <div class="field-wrap">
      <label for="l-user">Kullanıcı Adı</label>
      <input type="text" id="l-user" placeholder="kullanıcı adınızı girin" autocomplete="username">
    </div>
    <div class="field-wrap">
      <label for="l-pass">Şifre</label>
      <input type="password" id="l-pass" placeholder="••••••••" autocomplete="current-password">
    </div>
    <button id="l-btn">Giriş Yap →</button>
    <div id="l-err"></div>
  </div>
</div>

<!-- ═══ APP ═══ -->
<div id="app">

  <header class="hdr">
    <div class="hdr-brand">
      <div class="hdr-ico"><svg class="hdr-logo-svg" viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg" width="26" height="31"><defs><linearGradient id="gh" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#f0d060"/><stop offset="50%" stop-color="#c9a227"/><stop offset="100%" stop-color="#8a6010"/></linearGradient></defs><path d="M50 4 L96 22 L96 60 Q96 91 50 117 Q4 91 4 60 L4 22 Z" fill="url(#gh)"/><path d="M50 13 L88 29 L88 60 Q88 87 50 109 Q12 87 12 60 L12 29 Z" fill="#07091a"/><text x="50" y="78" text-anchor="middle" font-family="Georgia,serif" font-size="54" font-weight="bold" fill="url(#gh)">R</text></svg></div>
      <div>
        <div class="hdr-title">RAMOS NJT VIP<span class="hdr-xtra"> TRANSFER</span></div>
        <div class="hdr-sub">Arrival Transfer</div>
      </div>
    </div>
    <div class="hdr-right">
      <button class="add-btn mag" id="add-btn" style="display:none" onclick="openAddModal()">＋ Transfer Ekle</button>
      <div id="live-clock" class="hdr-clock">00:00:00</div>
      <div class="hdr-pill"><span class="live"></span><span id="cnt">—</span></div>
      <div id="upd" class="hdr-time">Yükleniyor...</div>
      <button class="logout-btn" id="logout-btn">Çıkış</button>
    </div>
  </header>

  <!-- DATE BAR -->
  <div class="date-bar">
    <span class="date-label">Tarih:</span>
    <div id="date-chips" style="display:flex;gap:7px;align-items:center;flex-wrap:nowrap;"></div>
    <div class="srch-wrap">
      <div class="srch-inner">
        <svg class="srch-ic" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#4f7097" stroke-width="2.5"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        <input type="text" id="search-input" placeholder="Misafir, uçuş numarası veya şoför ara…" autocomplete="off" spellcheck="false">
        <button id="srch-clear">✕ Temizle</button>
      </div>
    </div>
  </div>

  <div class="page" id="page">
    <div class="empty"><span class="empty-ico">✈</span>Yükleniyor...</div>
  </div>

  <div class="footer">RAMOS NJT VIP TRANSFER &nbsp;·&nbsp; Her 1 dakikada otomatik güncellenir</div>
</div>

<!-- ═══ BOTTOM NAV — sadece yönetici Ekle ═══ -->
<div id="mobile-nav">
  <button class="mnav-btn" id="mnav-add" style="display:none" onclick="openAddModal()">
    <span class="ni">➕</span><span>Transfer Ekle</span>
  </button>
</div>

<!-- ═══ PULL TO REFRESH ═══ -->
<div id="ptr-ind">↓ Yenilemek için çek</div>


<!-- ═══ TRANSFER EKLE MODAL ═══ -->
<div class="modal-ov" id="add-modal">
  <div class="modal-box">
    <div class="modal-title">＋ Yeni Transfer Ekle</div>
    <div class="form-grid">
      <div class="fg"><label>Tarih *</label><input id="f-tarih" type="text" placeholder="gg.aa.yyyy"></div>
      <div class="fg"><label>Saat *</label><input id="f-saat" type="text" placeholder="HH:MM"></div>
      <div class="fg full"><label>Müşteri Adı *</label><input id="f-musteri" type="text" placeholder="Ad Soyad"></div>
      <div class="fg"><label>Müşteri Tel</label><input id="f-tel" type="text" placeholder="905..."></div>
      <div class="fg"><label>Uçuş No</label><input id="f-ucus" type="text" placeholder="XQ169"></div>
      <div class="fg"><label>Kişi Sayısı</label><input id="f-kisi" type="text" placeholder="2"></div>
      <div class="fg full"><label>Araç</label><input id="f-arac" type="text" placeholder="Ultra VIP Maybach"></div>
      <div class="fg full"><label>Nereden *</label><input id="f-nereden" type="text" placeholder="Antalya Havalimanı" value="Antalya Havalimanı"></div>
      <div class="fg full"><label>Nereye *</label><input id="f-nereye" type="text" placeholder="Otel adı veya adres"></div>
      <div class="fg"><label>Şoför</label><input id="f-surucu" type="text" placeholder="Şoför adı"></div>
      <div class="fg"><label>Plaka</label><input id="f-plaka" type="text" placeholder="07 AA 001"></div>
      <div class="fg full"><label>Şoför Tel</label><input id="f-stel" type="text" placeholder="905..."></div>
    </div>
    <div id="add-err" style="margin-top:12px;font-size:12px;color:#f87171;min-height:18px"></div>
    <div class="modal-acts">
      <button class="btn-cx" onclick="closeAddModal()">İptal</button>
      <button class="btn-ok" id="add-submit-btn" onclick="submitAddTransfer()">Kaydet →</button>
    </div>
  </div>
</div>

<!-- ═══ VOUCHER OVERLAY ═══ -->
<div id="voucher-overlay">
  <div id="voucher-card">

    <!-- Üst / logo bölümü -->
    <div class="v-header">
      <div class="v-logo-wrap">
        <svg viewBox="0 0 100 120" xmlns="http://www.w3.org/2000/svg">
          <defs>
            <linearGradient id="gld" x1="0%" y1="0%" x2="100%" y2="100%">
              <stop offset="0%"   stop-color="#f0d060"/>
              <stop offset="50%"  stop-color="#c9a227"/>
              <stop offset="100%" stop-color="#8a6010"/>
            </linearGradient>
          </defs>
          <!-- Dış kalkan -->
          <path d="M50 4 L96 22 L96 60 Q96 91 50 117 Q4 91 4 60 L4 22 Z" fill="url(#gld)"/>
          <!-- İç koyu alan -->
          <path d="M50 13 L88 29 L88 60 Q88 87 50 109 Q12 87 12 60 L12 29 Z" fill="#07091a"/>
          <!-- R harfi -->
          <text x="50" y="78" text-anchor="middle"
                font-family="Georgia, 'Times New Roman', serif"
                font-size="54" font-weight="bold" fill="url(#gld)">R</text>
        </svg>
      </div>
      <div class="v-co-name">RAMOS NJT</div>
      <div class="v-co-sub">VIP TRANSFER</div>
    </div>

    <!-- Altın çizgi -->
    <div class="v-goldbar"></div>

    <!-- Misafir adı — büyük, ortalı -->
    <div class="v-name-area">
      <div class="v-welcome-lbl">WELCOME</div>
      <div class="v-cust-name" id="v-cust-name">—</div>
    </div>

    <!-- Butonlar -->
    <div class="v-vfooter">
      <button class="v-print-btn" id="v-print-btn">🖨 Yazdır / Print</button>
      <button class="v-close-btn" id="v-close-btn">✕ Kapat</button>
    </div>

  </div>
</div>


<script src="app.js"></script>
</body>
</html>
